<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт на GitHub Pages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .badge {
            background-color: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }
        button {
            background-color: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        button:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <h1> Автоматический деплой</h1>
    <p>Этот сайт был развёрнут автоматически с помощью <strong>GitHub Actions</strong>!</p>
    <p class="badge"> Деплой выполнен успешно</p>
    <button onclick="alert('Привет от GitHub Actions! ')">Нажми на меня</button>
    <p style="margin-top: 50px; font-size: 0.8em; opacity: 0.8;">
        Деплой выполнен в: <span id="datetime"></span>
    </p>
    <script>
        document.getElementById('datetime').innerHTML = new Date().toLocaleString();
    </script>
</body>
</html>
